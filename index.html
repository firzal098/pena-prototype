<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pena - Gamified Productivity & Budgeting Portal (Wireframe UI)</title>
    <!-- Importing Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RESET & SYSTEM STYLE */
        :root {
            --bg-main: #0f111a;
            --border-card: #2e3248;
            --bg-card: #161824;
            --text-main: #f1f5f9;
            --text-muted: #8f9bb3;
            
            --color-accent: #6366f1;  /* Indigo */
            --color-green: #10b981;   /* Emerald */
            --color-red: #ef4444;     /* Red */
            --color-amber: #f59e0b;   /* Amber */
            --color-pink: #ec4899;    /* Pink */
            --color-purple: #a855f7;  /* Purple */
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #090a0f 0%, #11131e 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px 0;
        }

        /* WEB LAYOUT CONTAINER (FOR THE PHONE MOCKUP) */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        .web-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
            text-align: center;
        }

        /* PHONE CHASSIS */
        .phone-chassis {
            width: 375px;
            height: 812px;
            background-color: #090a0f;
            border: 12px solid #2e3248;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 25px 60px -10px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(46, 50, 72, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* PHONE NOTCH */
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 24px;
            background-color: #090a0f;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .notch-camera {
            width: 8px;
            height: 8px;
            background-color: #121420;
            border: 1px solid #1e2230;
            border-radius: 50%;
        }

        .notch-speaker {
            width: 40px;
            height: 4px;
            background-color: #161824;
            border: 1px solid #2e3248;
            border-radius: 2px;
        }

        /* STATUS BAR */
        .status-bar {
            height: 44px;
            padding: 14px 24px 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            user-select: none;
            z-index: 990;
        }

        .status-time {
            color: var(--text-muted);
        }

        .status-icons {
            display: flex;
            gap: 4px;
        }

        /* HEADER */
        .screen-header {
            height: 48px;
            border-bottom: 1px solid #1e2230;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .screen-title {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        /* SCREEN VIEWPORT CONTENT AREA */
        .screen-body {
            flex: 1;
            background-color: var(--bg-main);
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px; /* Space for navbar */
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: var(--border-card) var(--bg-main);
        }

        /* Custom Scrollbar for Phone Body */
        .screen-body::-webkit-scrollbar {
            width: 4px;
        }
        .screen-body::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        .screen-body::-webkit-scrollbar-thumb {
            background: var(--border-card);
            border-radius: 2px;
        }

        /* AUTH GATE PAGE CONTAINER */
        .auth-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: center;
            padding: 10px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-accent), var(--color-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .auth-logo p {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
        }

        .auth-tabs {
            display: flex;
            background-color: #131524;
            border: 1px solid var(--border-card);
            border-radius: 18px;
            padding: 2px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            color: var(--text-main);
        }

        /* FORM CONTROLS */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 9.5px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--color-accent);
        }

        .form-select {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%238f9bb3' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border: none;
            border-radius: 22px;
            padding: 12px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-text-link {
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            margin-top: 16px;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .btn-text-link:hover {
            color: var(--text-main);
        }

        /* PREMIUM CARDS */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 10.5px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* NOTIFICATION WARNING BANNERS */
        .alert-banner {
            background-color: rgba(239, 68, 68, 0.08);
            border: 1px solid var(--color-red);
            color: #f87171;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 9.5px;
            font-weight: bold;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.3;
        }

        .alert-banner-warning {
            background-color: rgba(245, 158, 11, 0.08);
            border: 1px solid var(--color-amber);
            color: #fcd34d;
        }

        /* EXP PROGRESS BAR */
        .exp-progress-container {
            margin-top: 6px;
        }

        .exp-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .exp-lvl {
            color: var(--color-amber);
        }

        .exp-val {
            color: var(--text-muted);
        }

        .exp-bar-bg {
            background-color: #1e2238;
            border-radius: 6px;
            height: 10px;
            width: 100%;
            overflow: hidden;
        }

        .exp-bar-fill {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            height: 100%;
            border-radius: 6px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* DASHBOARD SIDE-BY-SIDE STATS */
        .dashboard-stats-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .dashboard-stat-card {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .stat-value {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 2px;
            font-family: 'Outfit', sans-serif;
        }

        .stat-desc {
            font-size: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* CHECKLIST ACTIVITY LIST */
        .section-header-text {
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-main);
            margin: 16px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-list {
            margin-bottom: 16px;
        }

        .task-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        /* CHECKBOX WIREFRAME STYLE */
        .checkbox-container {
            display: block;
            position: relative;
            width: 18px;
            height: 18px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background-color: transparent;
            border: 2px solid var(--border-card);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .checkbox-container input:checked ~ .checkmark {
            border-color: var(--color-accent);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 4.5px;
            top: 1.5px;
            width: 5px;
            height: 9px;
            border: solid var(--color-green);
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .task-details {
            min-width: 0;
        }

        .task-title {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-item.completed .task-title {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .task-category {
            font-size: 8px;
            font-weight: bold;
            margin-top: 2px;
        }

        .chip-badge {
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--color-accent);
            color: #818cf8;
            padding: 1px 6px;
            border-radius: 12px;
            font-size: 7.5px;
            font-weight: bold;
            display: inline-block;
        }

        .exp-tag {
            background-color: rgba(245, 158, 11, 0.06);
            border: 1px solid var(--color-amber);
            color: var(--color-amber);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 7.5px;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* CATEGORIES LIST SCROLL (HORIZONTAL CHIPS) */
        .categories-chips-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 14px;
            scrollbar-width: none;
        }

        .categories-chips-row::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            background-color: rgba(99, 102, 241, 0.05);
            border: 1px solid var(--border-card);
            border-radius: 14px;
            padding: 5px 12px;
            font-size: 9px;
            font-weight: bold;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }

        .category-chip.active {
            color: var(--text-main);
        }

        /* SEGMENTED TAB SELECTORS FOR FINANCE & ANALYTICS */
        .segmented-tabs {
            display: flex;
            background-color: #131524;
            border: 1px solid var(--border-card);
            border-radius: 18px;
            padding: 2px;
            margin-bottom: 14px;
        }

        .segmented-tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 9.5px;
            font-weight: bold;
            color: var(--text-muted);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .segmented-tab.active {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            color: var(--text-main);
        }

        /* COLOR PICKER INPUT WRAPPER */
        .color-picker-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker-input {
            width: 42px;
            height: 38px;
            border: 1px solid var(--border-card);
            border-radius: 8px;
            cursor: pointer;
            background: none;
            outline: none;
            padding: 0;
        }

        /* FINANCE BALANCE DETAILS */
        .finance-summary-card {
            background: linear-gradient(180deg, #1f2235 0%, #121420 100%);
            border-color: var(--border-card);
            text-align: left;
        }

        .finance-summary-limit {
            font-size: 8px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 4px;
        }

        /* TRANSACTIONS LIST */
        .transaction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1e2230;
        }

        .transaction-row:last-child {
            border-bottom: none;
        }

        .tx-desc {
            font-size: 10.5px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .tx-meta {
            font-size: 8px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .tx-amount {
            font-size: 11px;
            font-weight: bold;
            font-family: 'Outfit', sans-serif;
            text-align: right;
        }

        .tx-amount.sink {
            color: var(--color-red);
        }

        .tx-amount.gain {
            color: var(--color-green);
        }

        /* CHARTS */
        .chart-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            padding: 12px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 14px;
        }

        /* SVG CHART DECORATIONS */
        .chart-svg {
            width: 100%;
            height: 100%;
        }

        /* CHART SEGMENTED BAR */
        .segmented-bar-container {
            margin: 16px 0;
        }
        
        .segmented-bar {
            width: 100%;
            height: 14px;
            background-color: #1b1d2a;
            border-radius: 7px;
            overflow: hidden;
            display: flex;
        }

        .segmented-bar-fill {
            height: 100%;
        }

        /* CHART LEGENDS */
        .legend-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-main);
        }

        .legend-circle {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* LEADERBOARD PODIUMS */
        .podium-section {
            background: linear-gradient(180deg, #1f2235 0%, #121420 100%);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 16px;
            height: 155px;
        }

        .podium-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 6px;
            padding: 10px 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .podium-rank1 {
            border-color: var(--color-amber);
            background: rgba(245, 158, 11, 0.03);
            height: 135px;
        }

        .podium-rank2 {
            border-color: #64748b;
            height: 115px;
        }

        .podium-rank3 {
            border-color: #b45309;
            height: 100px;
        }

        .podium-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #1f2235;
            border: 1.5px solid #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7.5px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .podium-rank1 .podium-avatar {
            width: 28px;
            height: 28px;
            border-color: var(--color-amber);
            font-size: 9px;
        }

        .podium-rank-tag {
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .podium-rank1 .podium-rank-tag { color: var(--color-amber); }
        .podium-rank2 .podium-rank-tag { color: #94a3b8; }
        .podium-rank3 .podium-rank-tag { color: #d97706; }

        .podium-name {
            font-size: 8.5px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            max-width: 65px;
        }

        .podium-level {
            font-size: 7.5px;
            font-weight: bold;
            color: var(--color-amber);
        }

        /* LEADERBOARD LIST ROWS */
        .leaderboard-row {
            display: flex;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 6px;
        }

        .leader-rank-num {
            width: 20px;
            font-size: 9.5px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .leader-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--border-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7.5px;
            font-weight: bold;
            color: var(--color-accent);
            margin-right: 10px;
        }

        .leader-name {
            flex: 1;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leader-right {
            text-align: right;
        }

        .leader-level {
            font-size: 8.5px;
            font-weight: bold;
            color: var(--color-amber);
        }

        .leader-exp {
            font-size: 7.5px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* MILESTONE BADGES ROW */
        .badges-horizontal-container {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }

        .badges-horizontal-container::-webkit-scrollbar {
            display: none;
        }

        .badge-gallery-card {
            background-color: var(--bg-card);

            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-card);
            border-radius: 20px;
            transition: .3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-main);
            border-radius: 50%;
            transition: .3s;
        }

        input:checked + .slider {
            background-color: var(--color-green);
        }

        input:checked + .slider:before {
            transform: translateX(14px);
        }

            border-color: var(--color-green);
        }

        .toast-msg.danger {

        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
            animation: fall 1.5s linear forwards;
        }

        .balloon {
            position: absolute;
            width: 20px;
            height: 24px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            pointer-events: none;
            z-index: 1001;
            animation: rise 3s ease-in forwards;
        }

        .balloon:after {
            content: "▼";
            font-size: 5px;
            color: inherit;
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* KEYFRAMES ANIMATIONS */
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
        }

        @keyframes rise {
            0% { transform: translateY(600px); opacity: 0.9; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        // Checklist Status toggler
        function toggleTaskStatus(idx, checked) {
            const todayStr = new Date().toISOString().split('T')[0];
            const userTodayTasks = db.activities.filter(a => a.email === currentUserEmail && a.date === todayStr);
            const task = userTodayTasks[idx];
            
            // Find global index
            const globalIdx = db.activities.findIndex(a => a.email === currentUserEmail && a.date === todayStr && a.title === task.title);
            
            if (globalIdx === -1) return;
            
            const user = db.users[currentUserEmail];
            
            if (checked) {
                db.activities[globalIdx].status = "completed";
                user.exp += 50;
                showToast(`Hebat! +50 EXP didapat dari "${task.title}"! 🎉`, "success");
                triggerConfetti();
                
                // Level Up Check
                const expTarget = user.level * 100;
                if (user.exp >= expTarget) {
                    user.level += 1;
                    user.exp -= expTarget;
                    showToast(`🎊 SELAMAT! Kamu naik ke Level ${user.level}! 🎊`, "success");
                    triggerBalloons();
                    
                    // Master Badge (Level >= 20) Check
                    const hasMaster = db.user_badges.some(b => b.email === currentUserEmail && b.badge === "Master");
                    if (user.level >= 20 && !hasMaster) {
                        db.user_badges.push({
                            email: currentUserEmail,
                            badge: "Master",
                            unlocked_at: todayStr
                        });
                        showToast("👑 Lencana 'Master' Berhasil Terbuka!", "success");
                    }
                }
                
                // Daily Streak calculation
                const completedTodayCount = db.activities.filter(a => a.email === currentUserEmail && a.date === todayStr && a.status === "completed").length;
                if (completedTodayCount === 1) { // First task completed today
                    user.streak += 1;
                    showToast(`Streak-mu naik menjadi ${user.streak} hari berturut-turut! 🔥`, "success");
                    
                    // Disiplin Badge (Streak >= 3) Check
                    const hasDisiplin = db.user_badges.some(b => b.email === currentUserEmail && b.badge === "Disiplin");
                    if (user.streak >= 3 && !hasDisiplin) {
                        db.user_badges.push({
                            email: currentUserEmail,
                            badge: "Disiplin",
                            unlocked_at: todayStr
                        });
                        showToast("🏆 Lencana 'Disiplin' Berhasil Terbuka!", "success");
                    }
                }
            } else {
                db.activities[globalIdx].status = "pending";
                user.exp = Math.max(0, user.exp - 50);
                showToast("Status diubah ke pending. -50 EXP.");
                // Streak decrement / validation isn't automatically rolled back to prevent complexity
            }
            
            saveDB();
            renderHomePage();
        }

        function showBadgeToast(badgeName, isUnlockedStr) {
            const isUnlocked = isUnlockedStr === "true";
            let desc = "";
            
            if (badgeName === "Pemula") desc = "Pertama kali bergabung dengan Pena.";
            else if (badgeName === "Disiplin") desc = "Pertahankan streak mencatat 3 hari.";
            else if (badgeName === "Hemat") desc = "Sisa saldo keuangan bulan ini > 20% limit.";
            else if (badgeName === "Master") desc = "Capai tingkat Level 20.";
            
            if (isUnlocked) {
                showToast(`🏅 Lencana '${badgeName}' Unlocked! Syarat: ${desc}`, "success");
            } else {
                showToast(`🔒 Lencana '${badgeName}' Terkunci. Syarat: ${desc}`, "info");
            }
        }

        // Helper color converter
        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex.split('').map(char => char + char).join('');
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `${r}, ${g}, ${b}`;
        }

        function handleAddTask(e) {

            const title = document.getElementById("track-title").value.trim();

            const todayStr = new Date().toISOString().split('T')[0];
            
            db.activities.push({
                email: currentUserEmail,
                title: title,
                category: category,
                status: "pending",
                exp_rewarded: 50,
                date: todayStr
            });
            
            saveDB();
            showToast(`Kegiatan "${title}" berhasil ditambahkan!`, "success");
            renderTrackerPage();
        }

        function handleAddCategory(e) {
            e.preventDefault();
            const catName = document.getElementById("cat-name").value.trim();
            const catColor = document.getElementById("cat-color").value;
            
            const userCats = db.categories.filter(c => c.email === currentUserEmail);
            if (userCats.some(c => c.name.toLowerCase() === catName.toLowerCase())) {
                showToast("Nama kategori sudah terdaftar.", "danger");
                return;
            }
            
            db.categories.push({
                email: currentUserEmail,
                name: catName,
                color: catColor
            });
            
            saveDB();
            showToast(`Kategori "${catName}" berhasil ditambahkan!`, "success");
            renderTrackerPage();

            // Re-uses global checklist toggle logic but refreshes the tracker page
            const todayStr = new Date().toISOString().split('T')[0];
            const userTodayTasks = db.activities.filter(a => a.email === currentUserEmail && a.date === todayStr);
            const task = userTodayTasks[idx];
            const globalIdx = db.activities.findIndex(a => a.email === currentUserEmail && a.date === todayStr && a.title === task.title);
            
            if (globalIdx === -1) return;
            const user = db.users[currentUserEmail];
            
            if (checked) {
                db.activities[globalIdx].status = "completed";
                user.exp += 50;
                showToast(`Hebat! +50 EXP didapat! 🎉`, "success");

                // Level Check
                const expTarget = user.level * 100;

                    user.exp -= expTarget;
                    showToast(`🎊 SELAMAT! Kamu naik ke Level ${user.level}! 🎊`, "success");

                }
                
                // Streak check
                const completedTodayCount = db.activities.filter(a => a.email === currentUserEmail && a.date === todayStr && a.status === "completed").length;

                db.activities[globalIdx].status = "pending";

        function handleSaveProfile(e) {
            e.preventDefault();
            const name = document.getElementById("profile-name").value.trim();
            const limit = parseFloat(document.getElementById("profile-limit").value);
            
            const user = db.users[currentUserEmail];
            user.name = name;
            user.budget_limit = limit;
            
            saveDB();
            showToast("Profil berhasil diperbarui!", "success");
            renderSettingsPage();
        }

        function handleToggleReminder(checked) {
            db.users[currentUserEmail].reminders_enabled = checked;
            saveDB();
            showToast(checked ? "Notifikasi pengingat harian aktif." : "Notifikasi pengingat harian dinonaktifkan.");
        }

        function handleSaveReminderTime() {
            const time = document.getElementById("profile-reminder-time").value.trim();
            db.users[currentUserEmail].reminder_time = time;
            saveDB();
            showToast(`Waktu pengingat disetel ke ${time} WIB.`, "success");
        }

        function handleLogout() {
            currentUserEmail = "";
            localStorage.removeItem(SESSION_KEY);
            showToast("Anda berhasil keluar dari akun.");
            renderAuthPage();
        }

        // Modal Helpers
        function openModal(id) {
            document.getElementById(id).style.display = "flex";
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
        }

        function resetDatabase() {
            closeModal('reset-modal');
            localStorage.removeItem(DB_KEY);
            localStorage.removeItem(SESSION_KEY);
            initDB();
            showToast("Database Pena berhasil di-reset!", "success");
            renderAuthPage();
        }

        // --- PAGE INITIALIZATION BOOTSTRAP ---
        initDB();
        
        if (currentUserEmail) {
            // Already logged in
            document.getElementById("screen-header").style.display = "flex";
            document.getElementById("bottom-nav").style.display = "flex";
            switchTab("home");
        } else {
            // Go to login page
            renderAuthPage();
        }
        
    </script>
